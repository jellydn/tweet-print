<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetPrint - Convert Twitter/X to PDF</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TweetPrint</h1>
      <p class="subtitle">Convert Twitter/X links to clean, printable PDFs</p>
    </div>
    <div class="form-container" id="form-container">
      <form id="url-form">
        <div class="input-group">
          <input
            type="text"
            id="url-input"
            placeholder="Paste a Twitter/X link..."
            autocomplete="off"
          >
          <div id="error-message" class="error-message"></div>
        </div>
        <button type="button" id="generate-btn" class="btn btn-primary" disabled>
          Generate PDF
        </button>
      </form>
    </div>
    <div class="preview-container" id="preview-container" style="display: none;">
      <div id="tweet-preview"></div>
      <div class="preview-actions">
        <button type="button" id="download-pdf-btn" class="btn btn-primary">
          Download PDF
        </button>
        <button type="button" id="convert-another-btn" class="btn btn-secondary">
          Convert Another
        </button>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
