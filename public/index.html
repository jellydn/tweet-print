<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetPrint - Convert Twitter/X to PDF</title>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/logo-icon-128.png" sizes="128x128">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TweetPrint</h1>
      <p class="subtitle">Convert Twitter/X links to clean, printable PDFs</p>
    </div>
    <div class="form-container" id="form-container">
      <form id="url-form">
        <div class="input-group">
          <input
            type="text"
            id="url-input"
            placeholder="Paste a Twitter/X link..."
            autocomplete="off"
          >
          <div id="error-message" class="error-message"></div>
        </div>
        <button type="button" id="generate-btn" class="btn btn-primary" disabled>
          Generate PDF
        </button>
      </form>
    </div>
    <div class="preview-container" id="preview-container" style="display: none;">
      <div id="tweet-preview"></div>
      <div class="preview-actions">
        <button type="button" id="download-pdf-btn" class="btn btn-primary">
          Download PDF
        </button>
        <button type="button" id="convert-another-btn" class="btn btn-secondary">
          Convert Another
        </button>
      </div>
    </div>
    <div class="examples-section">
      <h2>Try these examples</h2>
      <div class="example-links">
        <a href="https://x.com/mattpocockuk/status/2024877741871378481" class="example-link">📝 Example Tweet 1</a>
        <a href="https://x.com/trq212/status/2024638793719177291" class="example-link">🔧 Example Tweet 2</a>
        <a href="https://x.com/jellydn/status/2024477341188313262" class="example-link">💡 Example Tweet 3</a>
      </div>
      <p class="examples-note">Click any link to try TweetPrint</p>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
