#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "biome"
name = "biome check"
entry = "bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true"
language = "system"
types_or = ["javascript", "jsx", "ts", "tsx", "json", "css"]

[[repos.hooks]]
id = "typecheck"
name = "typecheck"
entry = "bun run typecheck"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
